searx_engine:
  url: "http://localhost:8882/search"
  max_pages: 20
  delay: 1.0

scrape:
  timeout: 10000
  batch: [2, 4]
  delay: [1.0, 3.0]
  backoff: [3.0, 6.0]

scoring:
  baseline: 50
  ai_penalty: -20
  min_text: 50
  relevance:
    off_topic: 0.15
    low: 0.2
    moderate: 0.3
    high: 0.5

dedup:
  threshold: 0.6
  shingle_size: 5
  num_perm: 128
  min_content_length: 100

output:
  max_chars: 12000
  min_length: 200
  min_score: 30
  max_slug_length: 80
  tokens_per_char: 4
  truncation_marker: "\n[...truncated]"
  tiers:
    high: 70
    med: 45

models:
  embedding: "all-MiniLM-L6-v2"
  embedding_max_chars: 5000
  whisper: "base"
  whisper_device: "cpu"
  whisper_compute_type: "int8"
  whisper_audio_format: "bestaudio/best"

llm:
  model_path: "models/model.gguf"
  context_length: 2048
  max_tokens: 512
  max_input_chars: 4000
  temperature: 0.1
  threads: 4

blocklists:
  - name: "dev-filter"
    stars: 2326
    url: "https://raw.githubusercontent.com/quenhus/uBlock-Origin-dev-filter/main/dist/other_format/uBlacklist/all.txt"
  - name: "content-farms"
    stars: 1401
    url: "https://danny0838.github.io/content-farm-terminator/files/blocklist-ublacklist/content-farms.txt"
  - name: "so-translation"
    stars: 963
    url: "https://raw.githubusercontent.com/arosh/ublacklist-stackoverflow-translation/master/uBlacklist.txt"
  - name: "bad-websites"
    stars: 724
    url: "https://raw.githubusercontent.com/popcar2/BadWebsiteBlocklist/refs/heads/main/uBlacklist.txt"
  - name: "github-translation"
    stars: 246
    url: "https://raw.githubusercontent.com/arosh/ublacklist-github-translation/master/uBlacklist.txt"
