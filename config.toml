# ── Search Engine ──
[searx_engine]
url = "http://localhost:8882/search"
max_pages = 20
delay = 1.0

# ── Scraping ──
[scrape]
timeout = 10000
batch = [2, 4]
delay = [1.0, 3.0]
backoff = [3.0, 6.0]

# ── Quality Scoring ──
[scoring]
baseline = 50
ai_penalty = -20
min_text = 50
relevance = { off_topic = 0.15, low = 0.2, moderate = 0.3, high = 0.5 }

# ── Dedup ──
[dedup]
threshold = 0.6

# ── Output ──
[output]
max_chars = 12000
min_length = 200
min_score = 30
tiers = { high = 70, med = 45 }

# ── Models ──
[models]
embedding = "all-MiniLM-L6-v2"
embedding_max_chars = 5000
whisper = "base"
whisper_device = "cpu"

# ── LLM (for --analyze-with-llm) ──
[llm]
model_path = "models/model.gguf"
context_length = 2048
max_tokens = 512
max_input_chars = 4000
temperature = 0.1
threads = 4
